<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dikivermeil.id</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top, #1e293b 0%, #0b1220 40%, #050814 100%);
  font-family:Arial, sans-serif;
  color:white;
  scroll-behavior:smooth;
}

/* HEADER */
.header{
  padding:14px 20px;
  text-align:center;
  border-bottom:1px solid rgba(120,180,255,.15);
  backdrop-filter: blur(10px);
  background:rgba(15,23,42,.6);
  position:sticky;
  top:0;
  z-index:10;
}

.header h1{
  font-size:20px;
  font-weight:800;
  background:linear-gradient(90deg,#7dd3fc,#a78bfa,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:1px;
}

/* SEARCH */
.search{
  padding:12px 16px;
}

.search input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(125,211,252,.2);
  background:#0f172a;
  color:white;
  outline:none;
  font-size:14px;
  
  transition:
  border-color .25s ease,
  box-shadow .25s ease,
  background .25s ease;
}

.search input:focus{
  border-color:#7dd3fc;
  box-shadow:0 0 10px rgba(125,211,252,.2);
}

.search input::placeholder{
  color:rgba(255,255,255,.45);
}

/* FILTER */
.filters{
  display:flex;
  gap:10px;
  padding:0 12px 12px;
  overflow-x:auto;
  scrollbar-width:none;
}

.filters::-webkit-scrollbar{
  display:none;
}

.filter-btn{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:#0f172a;
  color:white;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  white-space:nowrap;

  border:1px solid rgba(255,255,255,.08);

  transition:
  .25s ease;
}

.filter-btn.active{
  background:#3b82f6;
  color:#fff;
  box-shadow:0 0 15px rgba(59,130,246,.45);
}

.filter-btn:hover{
  transform:translateY(-2px);
}

/* PRODUCTS GRID (SHOPEE STYLE) */
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

@media (min-width:700px){

  .products{
    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));
  }

}

/* CARD (FINAL COMBINED VERSION) */
.card{
  background:#0f172a;
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 6px 15px rgba(0,0,0,.25);
  text-decoration:none;
  color:white;
  position:relative;
  will-change:transform, opacity;
  transform:translateZ(0);
  
  transition:
    transform .25s ease,
    opacity .2s ease,
    box-shadow .25s ease,
    border-color .25s ease;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  border-color:#7dd3fc;
  box-shadow:0 20px 45px rgba(125,211,252,.25);
}

.card:active{
  transform:scale(.98);
}

/* IMAGE */ 
.card img{
  width:100%;
  aspect-ratio: 3 / 2;
  object-fit: cover;
  object-position: center;
  display:block;
  background:#0f172a;
  
  will-change: transform;
  
  transition:
    transform .35s ease,
    filter .35s ease,
    opacity .3s ease;
}

.card:hover img{
  transform:scale(1.05);
  filter:brightness(1.08);
}

/* INFO */
.info{
  padding:10px;
  background:rgba(255,255,255,.02);
  backdrop-filter: blur(4px);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.row > div:last-child{
  text-align:right;
  flex-shrink:0;
}

/* TITLE */
.title{
  font-size:14px;
  font-weight:600;
  line-height:1.2;
  margin-bottom:6px;

  max-width:60%;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  word-break:break-word;
}

/* PRICE */
.new{
  color:#60a5fa;
  font-size:15px;
  font-weight:700;
  white-space:nowrap;
  text-shadow:0 0 10px rgba(96,165,250,.25);
}

.old{
  color:#f87171;
  text-decoration:line-through;
  font-size:12px;
}

/* SOLD / READY BADGE */
.card.sold{
  opacity:.7;
  pointer-events:none;
}

.card.sold img{
  filter:grayscale(1);
}

.card.sold::after,
.card.ready::after{
  position:fixed;
  top:8px;
  left:8px;
  font-size:10px;
  padding:4px 8px;
  border-radius:999px;
  font-weight:700;
  z-index:2;
}

.card.sold::after{
  content:"SOLD OUT";
  background:linear-gradient(45deg,#ef4444,#dc2626);
  box-shadow:0 0 12px rgba(239,68,68,.45);
}

.card.ready::after{
  content:"READY STOCK";
  background:linear-gradient(45deg,#22c55e,#16a34a);
  box-shadow:0 0 12px rgba(34,197,94,.5);
}

/* BACKGROUND EFFECTS */
body::before{
  content:"";
  position:fixed;
  top:-200px;
  left:-200px;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(125,211,252,.25), transparent 60%);
  filter:blur(60px);
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  bottom:-200px;
  right:-200px;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(34,197,94,.15), transparent 60%);
  filter:blur(60px);
  z-index:-1;
}

.skeleton{
  position:relative;
  overflow:hidden;
  height:240px;
  border-radius:12px;
  background:#111827;
}

.skeleton::before{
  content:"";
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.08),
    transparent
  );

  transform:translateX(-100%);
  animation:skeleton-loading 1.2s infinite;
}

@keyframes skeleton-loading{
  100%{
    transform:translateX(100%);
  }
}

@media (hover:none){

  .card:hover{
    transform:none;
    box-shadow:0 6px 15px rgba(0,0,0,.25);
    border-color:rgba(255,255,255,.06);
  }

  .card:hover img{
    transform:none;
    filter:none;
  }

}

/* ANNOUNCEMENT */
.announcement{
  position:fixed;
  inset:0;
  z-index:9999;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(2,6,23,.78);
  backdrop-filter:blur(12px);

  padding:20px;

  animation:fadeIn .25s ease;
}

.announcement-box{
  position:relative;

  width:100%;
  max-width:350px;

  padding:24px;

  border-radius:26px;

  background:
    linear-gradient(
      180deg,
      rgba(15,23,42,.98),
      rgba(2,6,23,.98)
    );

  border:1px solid rgba(96,165,250,.18);

  box-shadow:
    0 25px 60px rgba(0,0,0,.55),
    0 0 40px rgba(59,130,246,.12);

  overflow:hidden;

  animation:popup .3s ease;
}

/* GLOW */
.announcement-box::before{
  content:"";

  position:absolute;
  top:-90px;
  right:-90px;

  width:220px;
  height:220px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(59,130,246,.28),
      transparent 70%
    );

  filter:blur(10px);
}

/* ICON */
.announcement-icon{
  width:72px;
  height:72px;

  margin:auto;
  margin-bottom:18px;

  border-radius:22px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:34px;

  background:
    linear-gradient(
      135deg,
      #60a5fa,
      #2563eb
    );

  box-shadow:
    0 10px 30px rgba(59,130,246,.35);
}

.announcement-icon svg{
  width:34px;
  height:34px;
  fill:white;
}

/* TITLE */
.announcement-title{
  text-align:center;

  font-size:24px;
  font-weight:800;

  margin-bottom:12px;
  letter-spacing:.5px;

  background:
    linear-gradient(
      90deg,
      #7dd3fc,
      #60a5fa,
      #2563eb
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TEXT */
.announcement-text{
  text-align:center;

  color:rgba(255,255,255,.68);

  font-size:13px;
  line-height:1.7;

  margin-bottom:22px;
}

/* BUTTON */
.announcement-btn{
  width:100%;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:14px;

  border-radius:16px;

  text-decoration:none;

  font-weight:700;
  color:white;

  background:
    linear-gradient(
      135deg,
      #3b82f6,
      #2563eb
    );

  box-shadow:
    0 10px 25px rgba(37,99,235,.35);

  transition:.25s ease;

  margin-bottom:10px;
}

.announcement-btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 14px 35px rgba(37,99,235,.45);
}

/* CLOSE */
.announcement-close{
  width:100%;

  padding:13px;

  border:none;
  border-radius:16px;

  background:rgba(255,255,255,.05);

  color:#cbd5e1;

  font-weight:600;

  cursor:pointer;

  transition:.2s ease;
}

.announcement-close:hover{
  background:rgba(255,255,255,.08);
}

/* ANIMATION */
@keyframes fadeIn{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

@keyframes popup{
  from{
    transform:translateY(15px) scale(.95);
    opacity:0;
  }
  to{
    transform:translateY(0) scale(1);
    opacity:1;
  }
}

body::before,
body::after{
  pointer-events:none;
}

body::after{
  bottom:-120px;
}

.banner{
  width:100%;
  padding:12px;
}

.banner img{
  width:100%;
  border-radius:14px;
  object-fit:cover;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

/* FULL BLEED BANNER */
.banner{
  width:100vw;
  margin-left:calc(50% - 50vw);
  margin-right:calc(50% - 50vw);
}

.banner img{
  width:100%;
  display:block;
  object-fit:cover;
  aspect-ratio: 16 / 6;
  border-radius:0;
}

</style>

<link rel="icon" href="favicon.png">

</head>
<body>

<!-- ANNOUNCEMENT -->
<div class="announcement" id="announcement">

  <div class="announcement-box">

    <div class="announcement-icon">

      <svg viewBox="0 0 24 24">
        <path d="M20 4L4 10V14L10 16L12 20H15L13 15L20 20V4Z"/>
      </svg>

    </div>

    <div class="announcement-title">
      dikivermeil.id
    </div>

    <div class="announcement-text">
      Join saluran whatsApp resmi dikivermeil.id untuk mendapatkan info update stok terbaru.
    </div>

    <a
      href="https://whatsapp.com/channel/0029Vb75l0UISTkBWWcQtB0v"
      target="_blank"
      class="announcement-btn"
    >
      Gabung Saluran
    </a>

    <button
      class="announcement-close"
      onclick="closeAnnouncement()"
    >
      Tutup
    </button>

  </div>

</div>

<div class="header">
  <h1>dikivermeil.id</h1>
</div>

<div class="banner">
  <img src="https://files.catbox.moe/rpd07o.jpg" alt="Banner">
</div>

<div class="search">
  <input type="text" id="searchInput" placeholder="Cari produk..." />
</div>

<div class="filters">

  <button class="filter-btn active" data-filter="all">
    Semua
  </button>

  <button class="filter-btn" data-filter="ml">
    Mobile Legends
  </button>

  <button class="filter-btn" data-filter="ff">
    Free Fire
  </button>

</div>

<div class="products" id="productContainer">

  <div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>

</div>

<script>

function formatHarga(num){

  num = Number(num);

  if(num >= 1000000){

    let jt = num / 1000000;

    return "Rp " + jt
      .toFixed(jt % 1 === 0 ? 0 : 1)
      .replace(".", ",") + "jt";

  }

  if(num >= 1000){

    let k = num / 1000;

    return "Rp " + k
      .toFixed(k % 1 === 0 ? 0 : 1)
      .replace(".", ",") + "k";

  }

  return "Rp " + num;

}

const API_URL = "database.json";

/*
==========================
AMBIL PRODUK
==========================
*/

fetch(API_URL)
.then(res => {
  if (!res.ok) throw new Error("API Error");
  return res.json();
})
.then(data => {

  // SORT SOLD BELAKANG
  data.sort((a, b) => {
    const aSold = a.status?.toUpperCase() === "SOLD";
    const bSold = b.status?.toUpperCase() === "SOLD";
    return aSold - bSold;
  });

  const container = document.getElementById("productContainer");

  if (!data.length) {
    container.innerHTML = `
      <div style="text-align:center;padding:40px;opacity:.7;">
        Produk kosong
      </div>
    `;
    return;
  }

  container.innerHTML = "";

  data.forEach(produk => {

    const sold = produk.status?.toUpperCase() === "SOLD";

    const id = produk.id || "";

    container.innerHTML += `
      <a href="${sold ? '#' : `produk.html?id=${id}`}"
         class="card ${sold ? 'sold' : 'ready'}" data-category="${(produk.kategori || '').toLowerCase().replace(/\s/g,'')}">

        <img
          src="${produk.gambar1 || 'https://placehold.co/600x600?text=No+Image'}"
          loading="lazy"
         decoding="async"
        >

        <div class="info">

          <div class="row">

            <div class="title">
              ${produk.nama || "-"}
            </div>

            <div>
              <div class="new">
                ${formatHarga(produk.harga_baru || 0)}
              </div>

              ${
                produk.harga_lama
                ? `<div class="old">
                    ${formatHarga(produk.harga_lama || 0)}
                   </div>`
                : ""
              }
            </div>

          </div>

        </div>

      </a>
    `;
  });

})
.catch(() => {
  document.getElementById("productContainer").innerHTML = `
    <div style="text-align:center;padding:40px;opacity:.7;">
      Gagal mengambil produk
    </div>
  `;
});

/*
==========================
SEARCH + FILTER
==========================
*/

const searchInput = document.getElementById("searchInput");
const filterBtns = document.querySelectorAll(".filter-btn");

let activeFilter = "all";

function filterProducts(){

  const value = searchInput.value
    .toLowerCase()
    .trim();

  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {

    const title =
      card.querySelector(".title")
      ?.innerText
      .toLowerCase() || "";

    const price =
      card.querySelector(".new")
      ?.innerText
      .toLowerCase() || "";

    const category =
  card.dataset.category
  ?.toLowerCase()
  .replace(/\s/g,'') || "";

    const matchSearch =
      title.includes(value) ||
      price.includes(value);

    const matchFilter =
      activeFilter === "all" ||
      category === activeFilter;

    if(matchSearch && matchFilter){

  card.style.display = "";

  requestAnimationFrame(() => {
    card.style.opacity = "1";
    card.style.transform = "scale(1)";
    card.style.pointerEvents = "auto";
  });

} else {

  card.style.display = "none";
  card.style.opacity = "0";
  card.style.transform = "scale(.95)";
  card.style.pointerEvents = "none";

}

  });

}

/* SEARCH */
searchInput.addEventListener(
  "input",
  filterProducts
);

/* FILTER BUTTON */
filterBtns.forEach(btn => {

  btn.addEventListener("click", () => {

    filterBtns.forEach(b =>
      b.classList.remove("active")
    );

    btn.classList.add("active");

    activeFilter =
      btn.dataset.filter;

    filterProducts();

  });

});

function closeAnnouncement(){
  document
    .getElementById("announcement")
    .style.display = "none";
}

</script>

</body>
</html>
